# ╔══════════════════════════════════════════════════════════════════════╗
# ║  GreenChem Score — CI/CD para Docker Hub                             ║
# ║  Construye y empuja la imagen Docker en cada push a main              ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: Build and Push Docker Image

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE_NAME: greenchemscore

jobs:
  build-and-push:
    name: Build, Test and Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout del código ────────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Configurar QEMU para multi-plataforma ──────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Configurar Docker Buildx ───────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Cache de capas Docker ──────────────────────────────────────
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      # ── 5. Extraer metadatos ─────────────────────────────────────────
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=

      # ── 6. Login a Docker Hub ────────────────────────────────────────
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 7. Construir y empujar imagen ────────────────────────────────
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      # ── 8. Resumen ────────────────────────────────────────────────────
      - name: Image digest
        if: github.event_name != 'pull_request'
        run: |
          echo "✅ Imagen construida y empujada exitosamente"
          echo "Tags: ${{ steps.meta.outputs.tags }}"
