# ╔══════════════════════════════════════════════════════════════════════╗
# ║  GreenChem Score — Verificación de Build para Streamlit             ║
# ║  Verifica que la app se ejecuta correctamente antes de deploy         ║
# ╚══════════════════════════════════════════════════════════════════════╝

name: Verify Streamlit Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify Streamlit App
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "import streamlit; import pandas; import plotly; import folium; print('✅ Todas las dependencias importadas correctamente')"

      - name: Syntax check
        run: |
          python -m py_compile app.py
          echo "✅ Sintaxis de app.py verificada"
